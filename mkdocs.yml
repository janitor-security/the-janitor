site_name: The Janitor
site_description: "Automated Dead Symbol Detection & Code Cleanup. Rust-Native. Zero-Copy. Polyglot."
site_url: https://thejanitor.app
repo_url: https://github.com/GhrammR/the-janitor
repo_name: GhrammR/the-janitor

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
  font:
    text: Roboto Mono
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Overview: index.md
  - Security Posture: security.md
  - Benchmarks: benchmarks.md
  - Intelligence Reports:
    - Global Audit 2026: case-studies/global-audit-2026.md
    - Godot Engine: case-studies/godot.md
  - Configuration:
    - janitor.toml Reference: governance.md
  - Pricing & Licensing: pricing.md
  - Legal:
    - Terms: terms.md
    - Privacy: privacy.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

# No Python-specific documentation plugins (mkdocstrings, etc.).
# This site documents a Rust binary; generated API docs are not applicable.
