site_name: The Janitor
site_description: "Automated Dead Symbol Detection & Code Cleanup. Rust-Native. Zero-Copy. Polyglot."
site_url: https://thejanitor.app
repo_url: https://github.com/janitor-security/the-janitor
repo_name: janitor-security/the-janitor

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
  font:
    text: Roboto Mono
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Manifesto: manifesto.md
  - Architecture: architecture.md
  - Setup: setup.md
  - Intelligence: intelligence.md
  - Discovery: discovery.md
  - Terms: terms.md
  - Privacy: privacy.md
  - R&D Roadmap: R_AND_D_ROADMAP.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

# No Python-specific documentation plugins (mkdocstrings, etc.).
# This site documents a Rust binary; generated API docs are not applicable.

