site_name: The Janitor
site_description: "Automated Dead Symbol Detection & Code Cleanup. Rust-Native. Zero-Copy. Polyglot."
site_url: https://thejanitor.app
repo_url: https://github.com/GhrammR/the-janitor
repo_name: GhrammR/the-janitor

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
  font:
    text: Roboto Mono
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Overview: index.md
  - Safety Guarantees: safety.md
  - Benchmarks: benchmarks.md
  - Pricing: pricing.md
  - Case Studies:
    - Godot Engine: case-studies/godot.md
  - Governance:
    - Licensing (BUSL-1.1): licensing.md
    - Token Gate: sovereignty/tokens.md
  - Legal:
    - Terms of Service: terms.md
    - Privacy Policy: privacy.md
  - Archive:
    - Legacy (Python v4): archive/legacy.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

# No Python-specific documentation plugins (mkdocstrings, etc.).
# This site documents a Rust binary; generated API docs are not applicable.
