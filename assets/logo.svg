<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neon glow filter for the terminal prompt -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner shadow for the hex -->
    <filter id="hex-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#dea584" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Void background -->
  <rect width="512" height="512" fill="#0d1117"/>

  <!-- Flat-top hexagon: R=222, center (256,256) -->
  <!-- Vertices: 0°(478,256) 60°(367,64.1) 120°(145,64.1) 180°(34,256) 240°(145,447.9) 300°(367,447.9) -->
  <polygon
    points="478,256 367,64 145,64 34,256 145,448 367,448"
    fill="#161b22"
    stroke="#dea584"
    stroke-width="2.5"
    stroke-opacity="0.45"
    filter="url(#hex-shadow)"
  />

  <!-- Inner hex accent ring (subtle) -->
  <polygon
    points="462,256 358,78 154,78 48,256 154,434 358,434"
    fill="none"
    stroke="#dea584"
    stroke-width="1"
    stroke-opacity="0.12"
  />

  <!-- >_ terminal prompt, centered at (256,256), glyph group -->
  <g filter="url(#glow)">
    <!-- > chevron: tips at x=148, apex at x=244 -->
    <polyline
      points="148,186 244,256 148,326"
      fill="none"
      stroke="#dea584"
      stroke-width="28"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />
    <!-- _ underscore -->
    <line
      x1="264" y1="326"
      x2="364" y2="326"
      stroke="#dea584"
      stroke-width="28"
      stroke-linecap="square"
    />
  </g>
</svg>
