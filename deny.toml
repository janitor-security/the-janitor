[advisories]
# Path to the local advisory database cache.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]

# No advisories suppressed. Ratatui was upgraded to 0.30 which dropped paste
# (RUSTSEC-2024-0436) and updated lru to 0.16.x (RUSTSEC-2026-0002 resolved).
ignore = []

[licenses]
# Confidence threshold for license expression detection.
confidence-threshold = 0.8

# Explicitly allowed SPDX license expressions.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "BUSL-1.1",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]

# Copyleft licenses are denied — flag for replacement.
# GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-* are not approved for this codebase.
exceptions = []

[bans]
# Warn on duplicate versions of the same crate in the dep tree.
multiple-versions = "warn"
# No crates explicitly banned at this time.
deny = []

[sources]
# Crates must come from crates.io; unknown registries are denied.
unknown-registry = "deny"
# Git-sourced deps are suspicious in production — warn but don't block.
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
