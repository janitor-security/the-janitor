name: CISA KEV Weekly Sync

# Fetches the CISA Known Exploited Vulnerabilities (KEV) catalog every Monday
# via `janitor update-wisdom --ci-mode`, which writes:
#   - .janitor/wisdom.rkyv           (binary Wisdom Registry)
#   - .janitor/wisdom_manifest.json  (diffable JSON manifest of all CVE entries)
#
# The workflow diffs the manifest against the last committed snapshot and opens
# a PR containing:
#   - Updated .janitor/cisa_kev_ids.txt  (sorted CVE-ID list for future diffs)
#   - .janitor/kev_checklist.md          (new entries + AST gate checklist)
#
# The engine is the sole arbiter of threat intelligence — no raw curl to CISA.

on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at 00:00 UTC
  workflow_dispatch:        # Manual trigger for ad-hoc syncs

permissions: read-all

jobs:
  kev-sync:
    name: CISA KEV Sync & Gate Checklist
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create branch with updated snapshot
      pull-requests: write   # open the PR

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            api.thejanitor.app:443
            www.cisa.gov:443

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest janitor binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/janitor-bin
          gh release download --repo janitor-security/the-janitor \
            --pattern "janitor" \
            --dir /tmp/janitor-bin \
            --clobber
          chmod +x /tmp/janitor-bin/janitor
          /tmp/janitor-bin/janitor --version

      - name: Run update-wisdom --ci-mode
        run: |
          set -euo pipefail
          /tmp/janitor-bin/janitor update-wisdom . --ci-mode
          echo "Manifest written:"
          wc -l .janitor/wisdom_manifest.json

      - name: Diff against known snapshot
        id: diff
        run: |
          set -euo pipefail
          # Extract sorted CVE-ID list from the freshly-written manifest.
          jq -r '.entries[].cve_id' .janitor/wisdom_manifest.json | sort \
            > .janitor/kev_ids_new.txt

          # If no prior snapshot exists, create baseline and skip PR.
          if [[ ! -f .janitor/cisa_kev_ids.txt ]]; then
            echo "No prior snapshot — writing baseline. No PR will be opened."
            cp .janitor/kev_ids_new.txt .janitor/cisa_kev_ids.txt
            echo "new_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compute additions (lines in new but not in known).
          comm -23 .janitor/kev_ids_new.txt .janitor/cisa_kev_ids.txt \
            > .janitor/kev_added.txt || true
          NEW_COUNT=$(wc -l < .janitor/kev_added.txt | tr -d ' ')
          echo "new_count=${NEW_COUNT}" >> "$GITHUB_OUTPUT"
          echo "${NEW_COUNT} new KEV entries detected"

      - name: Generate AST gate checklist
        if: steps.diff.outputs.new_count != '0'
        run: |
          set -euo pipefail
          TODAY=$(date +%Y-%m-%d)
          CHECKLIST=".janitor/kev_checklist.md"

          {
            echo "# CISA KEV Sync — ${TODAY}"
            echo ""
            echo "$(wc -l < .janitor/kev_added.txt | tr -d ' ') new entries in the CISA KEV catalog since last sync."
            echo ""
            echo "## New Entries"
            echo ""
            echo "| CVE ID | Vendor | Product | Vulnerability | Date Added |"
            echo "|--------|--------|---------|---------------|------------|"

            while IFS= read -r cve_id; do
              ROW=$(jq -r --arg id "$cve_id" '
                .entries[] | select(.cve_id == $id) |
                "| \(.cve_id) | \(.vendor) | \(.product) | \(.name) | \(.date_added) |"
              ' .janitor/wisdom_manifest.json)
              echo "${ROW}"
            done < .janitor/kev_added.txt

            echo ""
            echo "## AST Gate Checklist"
            echo ""
            echo "Review each entry above. For each entry whose language / framework is"
            echo "covered by a Janitor grammar, check whether an AST gate exists in"
            echo "\`crates/forge/src/slop_hunter.rs\`. If not, file a P0 IDEA entry in"
            echo "\`docs/INNOVATION_LOG.md\` under **P0 — Enterprise Security Depth**."
            echo ""
            echo "### Languages covered by the Janitor (23 grammars)"
            echo "Rust · Python · TypeScript · JavaScript · Go · Java · C# · C++ · C"
            echo "Ruby · PHP · Swift · Kotlin · Scala · Lua · HCL/Terraform · Nix"
            echo "GDScript · GLSL · Objective-C · Bash · YAML"
            echo ""
            echo "### Checklist"
            echo ""

            while IFS= read -r cve_id; do
              PRODUCT=$(jq -r --arg id "$cve_id" \
                '.entries[] | select(.cve_id == $id) | .product' \
                .janitor/wisdom_manifest.json)
              echo "- [ ] **${cve_id}** (${PRODUCT}) — confirm AST gate exists or file IDEA entry"
            done < .janitor/kev_added.txt

          } > "${CHECKLIST}"

          echo "Checklist written to ${CHECKLIST}"
          # Promote the new snapshot.
          cp .janitor/kev_ids_new.txt .janitor/cisa_kev_ids.txt

      - name: Open PR with updated snapshot and checklist
        if: steps.diff.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TODAY=$(date +%Y-%m-%d)
          BRANCH="chore/cisa-kev-sync-${TODAY}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add .janitor/cisa_kev_ids.txt .janitor/kev_checklist.md
          git commit -m "chore: CISA KEV sync ${TODAY} — $(wc -l < .janitor/kev_added.txt | tr -d ' ') new entries"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore: CISA KEV sync ${TODAY}" \
            --body "$(cat .janitor/kev_checklist.md)" \
            --base main \
            --head "${BRANCH}" \
            --label "security,intelligence"
