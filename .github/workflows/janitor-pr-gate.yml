name: Janitor PR Gate

on:
  pull_request:
    branches:
      - main

# Workflow-level: deny all by default.
permissions:
  contents: read

jobs:
  slop-gate:
    name: Structural Firewall
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    # Job-level: read PR diff + write step summary.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      # P4-11: Install Kani formal verifier (fail-open — does not block the gate).
      - name: Install Kani Verifier (fail-open)
        shell: bash
        run: |
          if cargo install --locked kani-verifier 2>/dev/null && cargo kani setup 2>/dev/null; then
            echo "✅ Kani verifier installed."
          else
            echo "⚠  Kani installation failed — formal verification harnesses skipped."
          fi
        continue-on-error: true
        timeout-minutes: 5

      # Dogfooding: run the composite action from the current branch so every
      # PR to this repo is itself gated by the version of the action it carries.
      - name: Janitor slop gate
        id: janitor
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_slop: 'true'

      - name: Upload bounce log
        # Always upload so reviewers can inspect findings even on gate failure.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: janitor-bounce-log-pr-${{ github.event.pull_request.number }}
          path: .janitor/bounce_log.ndjson
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 30
