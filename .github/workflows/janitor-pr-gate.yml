name: Janitor PR Gate

on:
  pull_request:
    branches:
      - main

# Workflow-level: deny all by default.
permissions: read-all

jobs:
  slop-gate:
    name: Structural Firewall
    runs-on: ubuntu-latest
    # Job-level: read PR diff + write step summary.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Dogfooding: run the composite action from the current branch so every
      # PR to this repo is itself gated by the version of the action it carries.
      - name: Janitor slop gate
        id: janitor
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_slop: 'true'

      - name: Upload bounce log
        # Always upload so reviewers can inspect findings even on gate failure.
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: janitor-bounce-log-pr-${{ github.event.pull_request.number }}
          path: .janitor/bounce_log.ndjson
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 30
