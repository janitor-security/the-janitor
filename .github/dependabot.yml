version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      tree-sitter:
        patterns:
          - "tree-sitter*"
      crypto:
        patterns:
          - "ed25519-dalek"
          - "sha2"
          - "blake3"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
