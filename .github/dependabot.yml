version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    rebase-strategy: "auto"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    groups:
      tree-sitter:
        patterns:
          - "tree-sitter*"
      crypto:
        patterns:
          - "ed25519-dalek"
          - "sha2"
          - "blake3"
      rkyv:
        patterns:
          - "rkyv"
          - "bytecheck"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
