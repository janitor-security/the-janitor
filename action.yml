name: 'Janitor Firewall'
description: 'Zero-upload structural firewall for AI-generated PRs'
inputs:
  token:
    description: 'GitHub token for API access'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Bootstrap Janitor Engine
      shell: bash
      run: |
        git clone https://github.com/janitor-security/the-janitor.git /tmp/the-janitor
        cargo build --manifest-path /tmp/the-janitor/Cargo.toml --release -p cli
        echo "JANITOR_BIN=/tmp/the-janitor/target/release/janitor" >> $GITHUB_ENV

    - name: Extract Patch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        gh pr diff ${{ github.event.pull_request.number }} > .janitor-pr.patch

    - name: Execute Stateless Firewall
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        INSTALLATION_ID=$(gh api /repos/${{ github.repository }}/installation | jq -r .id 2>/dev/null || echo "0")
        
        TOKEN_PAYLOAD=$(jq -n \
          --arg repo "${{ github.repository }}" \
          --argjson pr ${{ github.event.pull_request.number }} \
          --arg sha "${{ github.event.pull_request.head.sha }}" \
          --argjson id $INSTALLATION_ID \
          '{repo: $repo, pr: $pr, head_sha: $sha, installation_id: $id}')
          
        ANALYSIS_TOKEN=$(curl -s -X POST https://the-governor.fly.dev/v1/analysis-token \
          -H "Content-Type: application/json" \
          -d "$TOKEN_PAYLOAD" | jq -r .token)
          
        $JANITOR_BIN bounce . --patch .janitor-pr.patch --pr-number ${{ github.event.pull_request.number }} \
          --report-url https://the-governor.fly.dev/v1/report \
          --analysis-token "$ANALYSIS_TOKEN"
