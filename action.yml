name: 'Janitor Firewall'
description: >
  Zero-upload structural firewall for AI-generated PRs.
  Fails hard on any error — symmetric failure ensures the Governor Check Run
  is never left pending. The sole PR gate is the 'Janitor Integrity Check'
  run issued by the Governor via the GitHub Checks API.

# Only two inputs. All other configuration is governor-side.
inputs:
  token:
    description: 'GitHub token (contents: read, pull-requests: read)'
    required: true
  installation_id:
    description: >
      Janitor Sentinel App installation ID for this repository.
      Auto-resolved from github.event.installation.id when omitted — only
      required if the workflow is triggered outside a GitHub App event context
      (e.g. workflow_dispatch or scheduled runs).
    required: false
    default: ''

runs:
  using: 'composite'
  steps:

    # Step 1 — Restore cached janitor binary.
    #
    # Key: OS + digest of Cargo.lock, all crate source files, and crate manifests.
    # Hashing source alongside the lockfile ensures a cache miss whenever any
    # Rust source or Cargo.toml changes, not just when dependencies change.
    # Path: the compiled binary only — not the full target/ tree.
    # On cache hit  → Step 2 (Bootstrap) is skipped entirely.
    # On cache miss → Step 2 clones + builds, populating the cache on exit.
    - name: Cache Janitor Binary
      id: cache-build
      uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3 branch HEAD
      with:
        path: /tmp/the-janitor/target/release/janitor
        key: ${{ runner.os }}-rust-stable-janitor-v3-${{ hashFiles('**/Cargo.lock', 'crates/**/*.rs', 'crates/**/Cargo.toml') }}

    # Step 2 — Clone and compile on cache miss only.
    #
    # Dependabot PRs that touch Cargo.lock will miss the cache and attempt a
    # fresh build; all other PRs hit the cache and skip compilation entirely.
    # The `if` condition prevents redundant rebuilds on repeated runs.
    - name: Bootstrap Janitor Engine
      if: steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        git clone --depth 1 --branch "${{ github.action_ref || 'main' }}" \
          https://github.com/janitor-security/the-janitor.git /tmp/the-janitor
        cargo build --manifest-path /tmp/the-janitor/Cargo.toml --release -p cli

    # Step 3 — Export binary path (always runs; cache hit and miss both land here).
    - name: Export Janitor Binary Path
      shell: bash
      run: echo "JANITOR_BIN=/tmp/the-janitor/target/release/janitor" >> "$GITHUB_ENV"

    # Step 4 — Extract the PR unified diff.
    - name: Extract Patch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        gh pr diff "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          > .janitor-pr.patch

    # Step 5 — Exchange credentials, run bounce, POST result to Governor.
    #
    # set -eo pipefail: any command failure (curl, janitor bounce, jq) exits
    # immediately with a non-zero code, failing the Action visibly rather than
    # silently swallowing the error and leaving the Governor Check Run pending
    # for 9+ hours.  Symmetric failure — the workflow fails when the engine
    # fails; it succeeds when the engine succeeds.
    - name: Execute Stateless Firewall
      shell: bash
      run: |
        set -euo pipefail
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        # Resolve installation ID — prefer explicit input, fall back to the
        # installation context embedded in the App's webhook event payload.
        # If still absent or 0, call /v1/resolve-id to auto-resolve via the
        # Governor's App token — eliminates the "Wrong ID" support overhead.
        INSTALL_ID="${{ inputs.installation_id || github.event.installation.id || '0' }}"
        if [ "${INSTALL_ID}" = "0" ] || [ -z "${INSTALL_ID}" ]; then
            RESOLVED=$(curl -sf -X POST \
                https://the-governor.fly.dev/v1/resolve-id \
                -H "Content-Type: application/json" \
                -d "{\"repo_slug\":\"${{ github.repository }}\"}" \
                | jq -r '.installation_id // 0')
            if [ "${RESOLVED:-0}" != "0" ]; then
                INSTALL_ID="${RESOLVED}"
            fi
        fi

        TOKEN_PAYLOAD=$(jq -n \
          --arg  repo "${{ github.repository }}" \
          --argjson pr  ${{ github.event.pull_request.number }} \
          --arg  sha  "$HEAD_SHA" \
          --arg  id   "${INSTALL_ID:-0}" \
          '{repo: $repo, pr: $pr, head_sha: $sha, installation_id: (if $id == "" then 0 else ($id | tonumber) end)}')

        ANALYSIS_TOKEN=$(curl -sf -X POST \
          https://the-governor.fly.dev/v1/analysis-token \
          -H "Content-Type: application/json" \
          -d "$TOKEN_PAYLOAD" | jq -r '.token')

        "$JANITOR_BIN" bounce . \
          --patch         .janitor-pr.patch \
          --pr-number     "${{ github.event.pull_request.number }}" \
          --report-url    https://the-governor.fly.dev/v1/report \
          --analysis-token "$ANALYSIS_TOKEN" \
          --head-sha      "$HEAD_SHA"

    # Step 6 — Tabula Rasa: vaporise all /tmp artefacts and local caches.
    #
    # Runs unconditionally (even on failure) so that no state from this PR
    # execution can leak into a subsequent run on the same hosted runner.
    # Removes the compiled Janitor binary, the extracted patch, and any
    # selftest artefacts written to /tmp.
    - name: Cleanup Artifacts (Tabula Rasa)
      if: always()
      shell: bash
      run: |
        rm -rf /tmp/the-janitor /tmp/janitor-selftest-* .janitor-pr.patch || true
