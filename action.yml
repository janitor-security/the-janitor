name: 'The Janitor'
description: 'Automated Dead Code Detection & Excision for Rust/Python/JS/C++'

inputs:
  token:
    description: 'Janitor purge token (required for clean and dedup --apply). Obtain at thejanitor.app.'
    required: false
    default: ''
  path:
    description: 'Path to the codebase to analyze (relative to workspace root).'
    required: false
    default: '.'
  args:
    description: >
      Janitor subcommand and flags. Default runs a free audit.
      Examples: "scan --verbose", "dedup", "clean --token TOKEN".
      When using clean or dedup --apply, embed the token in this argument
      via ${{ secrets.JANITOR_TOKEN }}.
    required: false
    default: 'scan'

branding:
  icon: 'trash-2'
  color: 'red'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.args }}
    - ${{ inputs.path }}
