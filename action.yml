name: 'Janitor Firewall'
description: >
  Zero-upload structural firewall for AI-generated PRs.
  Fails hard on any error — symmetric failure ensures the Governor Check Run
  is never left pending. The sole PR gate is the 'Janitor Integrity Check'
  run issued by the Governor via the GitHub Checks API.

# Only three inputs. All other configuration is governor-side.
inputs:
  token:
    description: 'GitHub token (contents: read, pull-requests: read)'
    required: true
  deep_scan:
    description: 'Enable 32 MiB / 30 s deep-scan budgets for bounce analysis.'
    required: false
    default: 'false'
  installation_id:
    description: >
      Janitor Sentinel App installation ID for this repository.
      Auto-resolved from github.event.installation.id when omitted — only
      required if the workflow is triggered outside a GitHub App event context
      (e.g. workflow_dispatch or scheduled runs).
    required: false
    default: ''
  governor_url:
    description: >
      Base URL of your Sovereign Governor deployment.
      The Janitor does not use a cloud default — you MUST configure your own
      Governor endpoint.  Example: https://governor.your-org.internal
      Contact sales@thejanitor.app to provision a hosted or self-hosted Governor.
    required: true

runs:
  using: 'composite'
  steps:

    # Step 1 — Download pre-compiled binary and verify BLAKE3 integrity.
    #
    # SLSA Level 4 provenance: the binary in CI is the exact artifact emitted by
    # the signed release pipeline — not a re-compilation that could silently
    # diverge due to runner environment drift or supply-chain compromise of a
    # transitive Cargo dependency resolved at build time.
    #
    # Verification sequence:
    #   1. Derive the release tag from github.action_ref (the version in `uses:`).
    #   2. Download the pre-compiled binary and its companion .b3 BLAKE3 hash file
    #      from the GitHub Release assets.
    #   3. Compute the BLAKE3 hash of the downloaded binary using the `blake3`
    #      Python package (installed on-demand; always available in GH runners).
    #   4. Compare computed hash against the .b3 file — exit 1 on any mismatch.
    #      A tampered CDN or corrupted release asset is caught before execution.
    - name: Download and Verify Janitor Binary
      shell: bash
      run: |
        set -euo pipefail
        ACTION_TAG="${{ github.action_ref }}"
        # Normalize: ensure the tag starts with 'v' for the GitHub Release URL.
        [[ "${ACTION_TAG}" == v* ]] || ACTION_TAG="v${ACTION_TAG}"
        INSTALL_DIR=/tmp/janitor-bin
        mkdir -p "${INSTALL_DIR}"
        BASE_URL="https://github.com/janitor-security/the-janitor/releases/download/${ACTION_TAG}"
        # Download binary and BLAKE3 hash file.
        curl -fsSL "${BASE_URL}/janitor"    -o "${INSTALL_DIR}/janitor"
        curl -fsSL "${BASE_URL}/janitor.b3" -o "${INSTALL_DIR}/janitor.b3"
        # Install blake3 Python package for hash verification (idempotent).
        python3 -m pip install blake3 --quiet
        EXPECTED_HASH="$(tr -d '[:space:]' < "${INSTALL_DIR}/janitor.b3")"
        ACTUAL_HASH="$(JANITOR_PATH="${INSTALL_DIR}/janitor" python3 -c "
import blake3, os
data = open(os.environ['JANITOR_PATH'], 'rb').read()
print(blake3.blake3(data).hexdigest(), end='')
")"
        if [ "${ACTUAL_HASH}" != "${EXPECTED_HASH}" ]; then
            echo "FATAL: BLAKE3 integrity check failed — binary may be tampered" >&2
            echo "  Tag:      ${ACTION_TAG}" >&2
            echo "  Expected: ${EXPECTED_HASH}" >&2
            echo "  Actual:   ${ACTUAL_HASH}" >&2
            exit 1
        fi
        echo "BLAKE3 integrity verified: ${ACTUAL_HASH}"
        chmod +x "${INSTALL_DIR}/janitor"
        echo "JANITOR_BIN=${INSTALL_DIR}/janitor" >> "$GITHUB_ENV"

    # Step 4 — Extract the PR unified diff.
    - name: Extract Patch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        gh pr diff "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          > .janitor-pr.patch

    # Step 5 — Exchange credentials, run bounce, POST result to Governor.
    #
    # set -eo pipefail: any command failure (curl, janitor bounce, jq) exits
    # immediately with a non-zero code, failing the Action visibly rather than
    # silently swallowing the error and leaving the Governor Check Run pending
    # for 9+ hours.  Symmetric failure — the workflow fails when the engine
    # fails; it succeeds when the engine succeeds.
    - name: Execute Stateless Firewall
      shell: bash
      run: |
        set -euo pipefail
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        # Resolve installation ID — prefer explicit input, fall back to the
        # installation context embedded in the App's webhook event payload.
        # If still absent or 0, call /v1/resolve-id to auto-resolve via the
        # Governor's App token — eliminates the "Wrong ID" support overhead.
        INSTALL_ID="${{ inputs.installation_id || github.event.installation.id || '0' }}"
        GOVERNOR="${{ inputs.governor_url }}"
        if [ "${INSTALL_ID}" = "0" ] || [ -z "${INSTALL_ID}" ]; then
            RESOLVED=$(curl -sf -X POST \
                "${GOVERNOR}/v1/resolve-id" \
                -H "Content-Type: application/json" \
                -d "{\"repo_slug\":\"${{ github.repository }}\"}" \
                | jq -r '.installation_id // 0')
            if [ "${RESOLVED:-0}" != "0" ]; then
                INSTALL_ID="${RESOLVED}"
            fi
        fi

        TOKEN_PAYLOAD=$(jq -n \
          --arg  repo "${{ github.repository }}" \
          --argjson pr  ${{ github.event.pull_request.number }} \
          --arg  sha  "$HEAD_SHA" \
          --arg  id   "${INSTALL_ID:-0}" \
          '{repo: $repo, pr: $pr, head_sha: $sha, installation_id: (if $id == "" then 0 else ($id | tonumber) end)}')

        ANALYSIS_TOKEN=$(curl -sf -X POST \
          "${GOVERNOR}/v1/analysis-token" \
          -H "Content-Type: application/json" \
          -d "$TOKEN_PAYLOAD" | jq -r '.token')

        "$JANITOR_BIN" bounce . \
          --patch         .janitor-pr.patch \
          --pr-number     "${{ github.event.pull_request.number }}" \
          --report-url    "${GOVERNOR}/v1/report" \
          --analysis-token "$ANALYSIS_TOKEN" \
          --head-sha      "$HEAD_SHA" \
          ${{ inputs.deep_scan == 'true' && '--deep-scan' || '' }}

    # Step 6 — Publish Integrity Dashboard to GitHub Actions Step Summary.
    #
    # Reads the bounce log written by step 5 and appends a high-density
    # Markdown dashboard (Integrity Radar, Structural Topology, Provenance
    # Ledger, Vibe-Check) to the job summary visible in the Actions tab.
    # Best-effort (|| true): a rendering failure must never mask a real bounce
    # verdict or leave the Check Run in an ambiguous state.
    - name: Publish Integrity Dashboard
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        if [ -f .janitor/bounce_log.ndjson ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          "$JANITOR_BIN" step-summary . >> "$GITHUB_STEP_SUMMARY" || true
        fi

    # Step 7 — Tabula Rasa: vaporise all /tmp artefacts and local caches.
    #
    # Runs unconditionally (even on failure) so that no state from this PR
    # execution can leak into a subsequent run on the same hosted runner.
    # Removes the compiled Janitor binary, the extracted patch, and any
    # step-summary artefacts written to /tmp.
    - name: Cleanup Artifacts (Tabula Rasa)
      if: always()
      shell: bash
      run: |
        rm -rf /tmp/janitor-bin /tmp/janitor-selftest-* .janitor-pr.patch || true
