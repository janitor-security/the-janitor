name: 'Janitor Firewall'
description: >
  Zero-upload structural firewall for AI-generated PRs.
  Silent reporter: the workflow job always reports success regardless of
  the CLI exit code. The only PR gate is the 'Janitor Integrity Check'
  run issued by the Governor via the GitHub Checks API.

# Only two inputs. All other configuration is governor-side.
inputs:
  token:
    description: 'GitHub token (contents: read, pull-requests: read)'
    required: true
  installation_id:
    description: 'Janitor Sentinel App installation ID for this repository'
    required: true

runs:
  using: 'composite'
  steps:

    # Step 1a — Clone the janitor source (build input; always required).
    - name: Clone Janitor Source
      shell: bash
      run: git clone https://github.com/janitor-security/the-janitor.git /tmp/the-janitor

    # Step 1b — Compute Cargo.lock hash for the cache key.
    #
    # actions/cache hashFiles() only resolves paths inside $GITHUB_WORKSPACE.
    # The clone lands in /tmp, so we compute the hash in shell and export it
    # via GITHUB_OUTPUT instead.
    - name: Compute Cargo.lock Hash
      id: lock-hash
      shell: bash
      run: |
        echo "hash=$(sha256sum /tmp/the-janitor/Cargo.lock | cut -c1-64)" >> "$GITHUB_OUTPUT"

    # Step 1c — Restore cached binary (keyed on OS + Cargo.lock digest).
    #
    # Cache strategy: the binary is built from the *janitor* repo's Cargo.lock,
    # not the customer repo's.  Dependabot PRs change the customer Cargo.lock
    # but never the janitor's, so they always get a cache hit and never trigger
    # a rebuild against their own broken dependency tree.
    - name: Cache Janitor Binary
      id: cache-janitor
      uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3 branch HEAD
      with:
        path: /tmp/the-janitor/target/release/janitor
        key: janitor-bin-${{ runner.os }}-${{ steps.lock-hash.outputs.hash }}

    # Step 1d — Build only on cache miss.
    - name: Build Janitor Engine
      if: steps.cache-janitor.outputs.cache-hit != 'true'
      shell: bash
      run: cargo build --manifest-path /tmp/the-janitor/Cargo.toml --release -p cli

    # Step 1e — Expose the binary path regardless of cache/build path.
    - name: Export Janitor Binary Path
      shell: bash
      run: echo "JANITOR_BIN=/tmp/the-janitor/target/release/janitor" >> "$GITHUB_ENV"

    # Step 2 — Extract the PR unified diff.
    - name: Extract Patch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        gh pr diff "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          > .janitor-pr.patch

    # Step 3 — Exchange credentials, run bounce, POST result to Governor.
    #
    # continue-on-error: true  — the step is allowed to fail (the CLI exit
    # code is preserved in logs for diagnostics) but the workflow job itself
    # always reports success.  This removes the redundant 'Janitor Firewall'
    # check from the PR UI; the sole gating check is 'Janitor Integrity Check'
    # issued by the Governor.
    - name: Execute Stateless Firewall
      shell: bash
      continue-on-error: true
      run: |
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        TOKEN_PAYLOAD=$(jq -n \
          --arg  repo "${{ github.repository }}" \
          --argjson pr  ${{ github.event.pull_request.number }} \
          --arg  sha  "$HEAD_SHA" \
          --argjson id  ${{ inputs.installation_id }} \
          '{repo: $repo, pr: $pr, head_sha: $sha, installation_id: $id}')

        ANALYSIS_TOKEN=$(curl -sf -X POST \
          https://the-governor.fly.dev/v1/analysis-token \
          -H "Content-Type: application/json" \
          -d "$TOKEN_PAYLOAD" | jq -r '.token')

        "$JANITOR_BIN" bounce . \
          --patch         .janitor-pr.patch \
          --pr-number     "${{ github.event.pull_request.number }}" \
          --report-url    https://the-governor.fly.dev/v1/report \
          --analysis-token "$ANALYSIS_TOKEN" \
          --head-sha      "$HEAD_SHA"
